<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Redirecionando...</title>
	<script>
		const path = decodeURIComponent(window.location.pathname);
		sessionStorage.redirect = path;
		window.location.href = window.location.origin + '/ScreenSound/';
	</script>
</head>

</html>
